<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeakMate Design Direction: The Guided Focus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#1E3A8A', // Primary
                            800: '#1e40af',
                            50: '#f0f9ff',
                        },
                        cream: '#FEF3C7', // Secondary
                        action: '#3B82F6', // CTA
                        mint: '#10B981', // Success
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Quicksand', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .heading { font-family: 'Quicksand', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(30, 58, 138, 0.1);
        }
        .mic-button {
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .ni-avatar img {
            transition: transform 0.3s ease;
        }
        .ni-avatar:hover img {
            transform: scale(1.05) rotate(2deg);
        }
    </style>
</head>
<body class="bg-navy-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Header (Simple) -->
    <header class="w-full p-6 flex justify-between items-center bg-white/50 backdrop-blur-sm fixed top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-navy-900 rounded-lg flex items-center justify-center text-white font-bold heading">S</div>
            <span class="font-bold text-navy-900 text-xl heading">SpeakMate</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="px-3 py-1 bg-cream rounded-full text-sm font-semibold text-amber-700 flex items-center gap-1">
                🔥 12
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" />
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row items-center justify-center gap-8 p-6 mt-16 max-w-6xl mx-auto w-full h-full">

        <!-- Left Column: Context & Ni (Always Visible) -->
        <div class="w-full md:w-1/3 flex flex-col gap-6 h-full justify-center order-2 md:order-1">
            
            <!-- Ni Avatar -->
            <div class="ni-avatar relative mx-auto md:mx-0 w-32 h-32 md:w-48 md:h-48">
                <div class="absolute inset-0 bg-navy-900 rounded-full opacity-10 blur-xl top-4"></div>
                <img src="https://api.dicebear.com/7.x/personas/svg?seed=Ni&clothingColor=1e3a8a" alt="Ni Mentor" class="w-full h-full object-contain drop-shadow-lg relative z-10">
                
                <!-- Status Bubble -->
                <div class="absolute -top-2 -right-2 bg-white px-3 py-1 rounded-full shadow-md border border-slate-100 text-sm font-medium text-navy-900 animate-bounce">
                    Listening... 🎧
                </div>
            </div>

            <!-- Context Card -->
            <div class="glass-panel p-6 rounded-2xl border-l-4 border-navy-900">
                <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">Current Topic</h3>
                <h2 class="text-xl font-bold text-navy-900 mb-2 heading">Is Pineapple on Pizza a Crime?</h2>
                <p class="text-slate-600 text-sm">Convince me that it's actually a culinary masterpiece.</p>
            </div>

        </div>

        <!-- Center/Right Column: Interaction & Transcript -->
        <div class="w-full md:w-2/3 flex flex-col items-center justify-center gap-8 h-full order-1 md:order-2">

            <!-- Living Transcript Area -->
            <div class="w-full max-w-2xl text-center space-y-4 min-h-[120px] flex flex-col justify-end pb-4">
                <p class="text-2xl md:text-3xl font-medium text-slate-300 transition-colors duration-300">
                    <span class="text-navy-900">I think</span> 
                    <span class="text-navy-900">pineapple</span> 
                    <span class="text-navy-900">adds a</span> 
                    <span class="text-mint font-bold border-b-2 border-mint/30">nice contrast</span> 
                    <span class="text-slate-400">...umm...</span>
                </p>
                <!-- Hint Suggestion (Hidden/Subtle) -->
                <button class="mx-auto text-sm text-action font-medium hover:underline opacity-80 hover:opacity-100 transition-opacity">
                    ✨ Ni: Stuck? Tap for a hint
                </button>
            </div>

            <!-- Mic Interaction -->
            <div class="relative">
                <button class="mic-button w-24 h-24 rounded-full bg-action text-white flex items-center justify-center text-3xl shadow-xl hover:bg-blue-600 transition-colors z-20 relative">
                    🎙️
                </button>
                <!-- Ripple Effect Ring -->
                <div class="absolute inset-0 rounded-full border border-action opacity-30 scale-150 z-0"></div>
            </div>

            <p class="text-slate-500 text-sm font-medium">Hold to Speak • Release to Send</p>

        </div>

    </main>

</body>
</html>
